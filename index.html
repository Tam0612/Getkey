<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiruScript - Get Key</title>
    <style>
        :root {
            --primary-color: #0088cc;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--primary-color); }

        .key-box {
            background: #000;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            word-break: break-all;
            border: 1px solid #334155;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background-color: #0077b5;
            transform: scale(1.05);
        }

        .status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>KEY CỦA BẠN ĐÂY</h1>
    <div class="key-box" id="keyDisplay">Đang tạo key...</div>
    <button onclick="copyAndRedirect()">Sao chép Key</button>
    <p class="status" id="statusText">Nhấn nút để lấy key và tham gia Telegram.</p>
</div>

<script>
    // Hàm tạo key ngẫu nhiên Hiru_xxxxxxx (số, chữ hoa, chữ thường)
    function generateKey() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        let result = "Hiru_";
        for (let i = 0; i < 7; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    // Hiển thị key khi load trang
    const currentKey = generateKey();
    document.getElementById('keyDisplay').innerText = currentKey;

    function copyAndRedirect() {
        // Sao chép vào clipboard
        navigator.clipboard.writeText(currentKey).then(() => {
            document.getElementById('statusText').innerText = "Đã sao chép! Đang chuyển hướng...";
            
            // Chờ 1 giây để người dùng kịp thấy thông báo rồi chuyển hướng
            setTimeout(() => {
                window.location.href = "https://t.me/hirumodez";
            }, 1000);
        }).catch(err => {
            alert("Lỗi khi sao chép: " + err);
        });
    }
</script>

</body>
</html>
